<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    overflow: hidden;
}
.container {
    text-align: center;
    background: rgba(0,0,0,0.5);
    padding: 25px;
    border-radius: 20px;
}
.heart-img {
    width: 220px;
    animation: heartbeat 1s infinite;
}
@keyframes heartbeat {
    0% { transform: scale(1); }
    25% { transform: scale(1.1); }
    50% { transform: scale(1); }
    75% { transform: scale(1.15); }
    100% { transform: scale(1); }
}
.name {
    position: absolute;
    top: 32%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 28px;
    font-weight: bold;
}
h1 { color: white; }
p { color: #ffdede; }
button {
    padding: 12px 25px;
    font-size: 16px;
    border-radius: 25px;
    border: none;
    margin: 10px;
    cursor: pointer;
}
#yesBtn { background: #ff4b5c; color: white; }
#noBtn { background: white; color: #ff4b5c; position: absolute; }
</style>
</head>
<body>
<div class="container" id="mainBox">
    <div style="position: relative;">
        <img src="love.png" class="heart-img">
        <div class="name">Saranya ❤️</div>
    </div>
    <h1>Will You Be My Love? ❤️</h1>
    <p>You are the reason for my smile 💖</p>
    <button id="yesBtn" onclick="sayYes()">Yes 💕</button>
    <button id="noBtn">No 😢</button>
</div>
<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
let yesSize = 16;

function moveButton() {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
    yesSize += 5;
    yesBtn.style.fontSize = yesSize + "px";
    yesBtn.style.padding = (10 + yesSize/2) + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", function(e) {
    e.preventDefault();
    moveButton();
});
noBtn.addEventListener("click", function(e) {
    e.preventDefault();
    moveButton();
});

function sayYes() {
    document.body.innerHTML = `
        <div style="text-align:center; margin-top:100px;">
            <img src="love.png" style="width:250px; animation: heartbeat 1s infinite;">
            <h1 style="color:white;">I Love You ❤️😍</h1>
            <p style="color:#ffdede;">You made me the happiest person 💖</p>
        </div>
    `;
}
</script>
</body>
</html>
